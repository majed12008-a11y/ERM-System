# ───────────────────────────────────────────────
# ERM System — OpenAPI 3.1 Root Assembly
# Contract Layer: Composition & Binding
# ───────────────────────────────────────────────
# THIS FILE IS THE SINGLE EXECUTABLE API CONTRACT.
# After this file is finalized:
#   - Any response shape change = contract version bump
#   - Backend becomes implementation layer
#   - SDK becomes derived artifact
#   - Frontend becomes consumer
# ───────────────────────────────────────────────

openapi: 3.1.0

info:
  title: ERM Ethics API
  version: 1.0.0
  description: |
    Ethics Review Management (ERM) System — API Contract.

    Base URL: `/api/v1`
    Auth: Bearer JWT (15min access token, 7d refresh token in httpOnly cookie)

    ## Contract Stability
    This specification is locked after Sprint 5.
    Any breaking change requires a contract version bump.

    ## Domains
    - Security (auth, users, roles, permissions, profiles, responsibilities)
    - Core (projects, applications, lookups)
    - Committee (committees, meetings, members, reviews, voting)
    - Documents (upload, sign, classify)
    - Workflow (definitions, instances, transitions)
    - Communication (notifications, messages)
    - Reporting (dashboard, analytics, CSV export)
    - Safety (adverse events, risk register, incidents)
    - Monitoring (health, audit log, system config)
    - Integration (events, logs)
    - System (saved searches, config)
    - Admin (stats, activity, online users)
    - Reference (institutions, professions, licenses)

servers:
  - url: http://localhost:3000/api/v1
    description: Development server

# ── Global Security ──
# All endpoints require bearerAuth by default.
# Public endpoints explicitly opt out with `security: []`.
security:
  - bearerAuth: []

# ── Tags ──
tags:
  - name: Auth
    description: Authentication (login, register, refresh, logout, me, change-password)
  - name: Users
    description: User management (CRUD, profiles, responsibilities)
  - name: Roles
    description: Role definition and management
  - name: Permissions
    description: Permission management and role assignment
  - name: Admin
    description: Administrative dashboard (stats, audit log, activity)
  - name: Committees
    description: Committee CRUD, meetings, members, and terms
  - name: Reviews
    description: Review assignments, forms, questions, scoring
  - name: Voting
    description: Voting sessions, casting, and closure
  - name: Projects
    description: Research project management
  - name: Applications
    description: Ethics application submissions and review
  - name: Lookups
    description: Reference lookup data (categories, classifications)
  - name: Documents
    description: Document upload, signing, and classification
  - name: Workflow
    description: Workflow definitions, instances, and transitions
  - name: Communication
    description: Notifications and internal messaging
  - name: Reporting
    description: Dashboard statistics, trends, and data export
  - name: Safety
    description: Adverse events, risk register, incidents, corrective actions
  - name: Monitoring
    description: Health check, system audit, configuration
  - name: Integration
    description: External integration events and logs
  - name: System
    description: Saved searches and system configuration
  - name: Reference
    description: Public reference data (institutions, professions, licenses)
  - name: Health
    description: Service health check

