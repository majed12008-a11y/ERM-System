paths:
  /committee/committee-types:
    get:
      tags: [Committees]
      summary: List committee types
      responses:
        '200':
          description: Committee type list

  /committee/committees:
    get:
      tags: [Committees]
      summary: List committees
      responses:
        '200':
          description: Committee list
    post:
      tags: [Committees]
      summary: Create committee
      responses:
        '201':
          description: Committee created

  '/committee/committees/{id}':
    get:
      tags: [Committees]
      summary: Get committee by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Committee details
    put:
      tags: [Committees]
      summary: Update committee
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Committee updated
    delete:
      tags: [Committees]
      summary: Deactivate committee
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Committee deactivated

  '/committee/meetings/committee/{committeeId}':
    get:
      tags: [Committees]
      summary: List meetings for committee
      parameters:
        - name: committeeId
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Meeting list

  /committee/meetings:
