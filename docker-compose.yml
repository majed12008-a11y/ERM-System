services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ethics_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./DDL Script.sql:/docker-entrypoint-initdb.d/01-ddl.sql:ro
      - ./ethics_db_tables.sql:/docker-entrypoint-initdb.d/02-tables.sql:ro
      - ./ethics_db_functions.sql:/docker-entrypoint-initdb.d/03-functions.sql:ro
      - ./ethics_db_tables_constraints.sql:/docker-entrypoint-initdb.d/04-constraints.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ethics_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    mem_reservation: 512m

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ethics_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgres://postgres:${DB_PASSWORD:-postgres}@postgres:5432/ethics_db
    volumes:
      - backups:/app/backups
      - uploads:/app/uploads
    ports:
      - "8080:8080"
    mem_limit: 512m
    mem_reservation: 256m

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    mem_limit: 256m
    mem_reservation: 128m

volumes:
  pgdata:
  backups:
  uploads:
